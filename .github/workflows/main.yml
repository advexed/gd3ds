name: Build nightly

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    name: Compile ROM
    steps:
      - name: Update dependencies
        run: |
          dkp-pacman -Syu --noconfirm 3ds-mpg123 3ds-zlib
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Make application
        run: |
          make 3dsx cia
      - name: Prepare for build publishing
        run: |
          mkdir -p out/3dsx/rom
          mkdir -p out/cia/rom
          cp output/GeometryDash3DS.3dsx out/3dsx/rom
          cp output/GeometryDash3DS.cia out/cia/rom
      - name: Publish build to GH Actions
        uses: actions/upload-artifact@v4
        with:
          name: gd3ds
          path: |
            out/3dsx/rom
            out/cia/rom
